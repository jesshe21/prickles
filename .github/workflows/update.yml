name: update-status

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: update-status
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        run: python scripts/update.py

      - name: Commit changes if any
        run: |
          git config user.name "prickles-bot"
          git config user.email "prickles-bot@users.noreply.github.com"
          git add docs/status.json docs/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update status $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
